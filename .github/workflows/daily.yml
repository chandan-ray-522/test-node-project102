name: NSE Data Automation

on:
  workflow_dispatch: # Manual run ke liye
  schedule:
    - cron: '30 13 * * 1-5' # Har Mon-Fri, IST shaam 7:00 baje (UTC 13:30)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Automation
        env:
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
          SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
        run: python main.py
